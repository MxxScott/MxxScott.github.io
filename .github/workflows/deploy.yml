name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC — refreshes project data

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh project data from GitHub API
        run: python scripts/fetch_projects.py || echo "Using committed projects.json"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Environment info
        run: |
          echo "::group::Env"
          node --version
          npm --version
          echo "::endgroup::"
          echo "::group::Workspace"
          pwd
          ls -la
          echo "::endgroup::"
          echo "::group::package.json"
          cat package.json
          echo "::endgroup::"

      - name: Install dependencies (verbose)
        run: npm ci --loglevel verbose || npm install --loglevel verbose

      - name: Build static site (verbose)
        run: |
          echo "Building..."
          npm run build
          echo "Build exit: $LASTEXITCODE"

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
