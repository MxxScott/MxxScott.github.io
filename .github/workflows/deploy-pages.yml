name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Environment info
        run: |
          echo "::group::Env"
          node --version
          npm --version
          echo "::endgroup::"
          echo "::group::Workspace"
          pwd
          ls -la
          echo "::endgroup::"
          echo "::group::package.json"
          cat package.json
          echo "::endgroup::"

      - name: Install dependencies
        run: npm ci --loglevel verbose

      - name: Build (verbose)
        run: |
          echo "Building..."
          npm run build
          echo "Build exit: $LASTEXITCODE"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
